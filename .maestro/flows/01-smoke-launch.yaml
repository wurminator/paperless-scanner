# Smoke Test — App starts without crash
appId: com.paperless.scanner.debug
tags:
  - smoke
---
- launchApp

# Wait for analytics consent dialog or main screen
- extendedWaitUntil:
    visible:
      text: "Decline|Connect to Paperless"
    timeout: 15000

# If analytics dialog shown, dismiss it
- tapOn:
    text: "Decline"
    optional: true

# Verify server setup screen appears
- extendedWaitUntil:
    visible: "Connect to Paperless"
    timeout: 10000

- assertVisible: "Connect to Paperless"
