# Quick Upload — Share a PDF to the app
appId: com.paperless.scanner.debug
tags:
  - quick-upload
---
# Launch app
- launchApp

# Share a test file via ADB first, then test app health
# (Maestro intent support is limited in headless mode)
# Verify app is running
- extendedWaitUntil:
    visible:
      text: ".*"
    timeout: 5000
