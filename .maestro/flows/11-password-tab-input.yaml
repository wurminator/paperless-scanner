# Server Setup — Password tab visible and functional
appId: com.paperless.scanner.debug
tags:
  - server-setup
  - onboarding
---
- clearState

- launchApp

- extendedWaitUntil:
    visible: "Decline"
    timeout: 15000
- tapOn: "Decline"

- extendedWaitUntil:
    visible: "Connect to Paperless"
    timeout: 10000

# Switch to Password tab
- tapOn: "Password"

# Wait for password tab content
- extendedWaitUntil:
    visible: "Username"
    timeout: 5000

# Verify password tab elements
- assertVisible: "Server URL"
- assertVisible: "Username"
- assertVisible: "Password"

# Type in Server URL field
- tapOn: "Server URL"
- inputText: "https://paperless.example.com"

# Type in Username
- tapOn: "Username"
- inputText: "admin"

# Type in Password
- tapOn: "Password"
- inputText: "testpass123"

# Verify we're still on setup screen by checking header
- assertVisible: "Connect to Paperless"
