# Onboarding — Verify consent screen appears on fresh install
appId: com.paperless.scanner.debug
tags:
  - onboarding
---
# Clear app data to simulate fresh install
- clearState

- launchApp

# First screen on fresh install: Analytics consent dialog
- assertVisible: "ANALYTICS"
- assertVisible: "Help us improve the app"

# Tap Accept to proceed
- tapOn: "Accept"

# Should now show server setup screen
- extendedWaitUntil:
    visible:
      text: ".*"
    timeout: 5000
